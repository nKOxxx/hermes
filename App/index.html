<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ARES Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --accent-cyan: #00d4ff;
            --accent-yellow: #ffd700;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --border: #2a2a3a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            background: var(--bg-secondary);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 32px;
        }
        
        .title-group h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .title-group p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }
        
        /* Main */
        main {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        
        button.primary {
            background: var(--accent-cyan);
            color: var(--bg-primary);
            border-color: var(--accent-cyan);
        }
        
        button.primary:hover {
            background: #00b8e6;
        }
        
        button.danger:hover {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }
        
        /* Agents Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .agent-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
        }
        
        .agent-card.running {
            border-color: var(--accent-orange);
        }
        
        .agent-card.completed {
            border-color: var(--accent-green);
        }
        
        .agent-card.failed {
            border-color: var(--accent-red);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        
        .status-dot.running {
            background: var(--accent-orange);
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.completed {
            background: var(--accent-green);
        }
        
        .status-dot.failed {
            background: var(--accent-red);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .agent-name {
            font-weight: 600;
            font-size: 16px;
        }
        
        .agent-task {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .agent-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        
        .agent-status {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .agent-status.running { color: var(--accent-orange); }
        .agent-status.completed { color: var(--accent-green); }
        .agent-status.failed { color: var(--accent-red); }
        
        .agent-time {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            border-radius: 4px;
        }
        
        .remove-btn:hover {
            background: var(--accent-red);
            color: white;
        }
        
        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 64px;
        }
        
        .empty-state h2 {
            color: var(--text-primary);
            font-size: 20px;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
        }
        
        .modal h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .modal input, .modal textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .modal input:focus, .modal textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }
        
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        /* Settings */
        .settings-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .settings-row label {
            width: 100px;
        }
        
        .settings-row input {
            flex: 1;
        }
        
        /* Log Viewer */
        .log-viewer {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: var(--accent-green);
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">⚡</span>
        <div class="title-group">
            <h1>ARES Agent</h1>
            <p id="agent-count">0 agents</p>
        </div>
        <div class="header-actions">
            <button onclick="refreshAgents()">↻ Refresh</button>
            <button onclick="openSettings()" class="secondary">⚙ Settings</button>
        </div>
    </header>
    
    <main>
        <div class="toolbar">
            <button onclick="openNewTask()" class="primary">+ Spawn Agent</button>
            <button onclick="collectResults()">📦 Collect Results</button>
            <button onclick="removeCompleted()">🗑 Clear Completed</button>
        </div>
        
        <div id="agents-container" class="agents-grid">
            <!-- Agents will be rendered here -->
        </div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
            <span class="icon">💻</span>
            <h2>No Agents Running</h2>
            <p>Spawn agents to work on your tasks in parallel</p>
            <button onclick="openNewTask()" class="primary">+ Spawn Agent</button>
        </div>
    </main>
    
    <!-- New Task Modal -->
    <div id="new-task-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <h2>⚡ Spawn New Agent</h2>
            <input type="text" id="task-name" placeholder="Task name (e.g., Build Argus Feature)">
            <textarea id="task-description" placeholder="Describe what this agent should do..."></textarea>
            <div class="modal-actions">
                <button onclick="closeNewTask()">Cancel</button>
                <button onclick="spawnAgent()" class="primary">Spawn</button>
            </div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <h2>⚙ Settings</h2>
            <div class="settings-row">
                <label>Workspace:</label>
                <input type="text" id="workspace-path" placeholder="/path/to/workspace">
            </div>
            <p style="font-size: 12px; color: var(--text-secondary); margin-top: 10px;">
                Agents will clone and work in this directory.
            </p>
            <div class="modal-actions">
                <button onclick="closeSettings()">Close</button>
                <button onclick="saveSettings()" class="primary">Save</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let agents = [];
        let settings = {
            workspace: localStorage.getItem('ares-workspace') || (process.env.HOME + '/Projects')
        };
        
        // Load agents from storage
        function loadAgents() {
            const stored = localStorage.getItem('ares-agents');
            agents = stored ? JSON.parse(stored) : [];
            renderAgents();
        }
        
        // Save agents to storage
        function saveAgents() {
            localStorage.setItem('ares-agents', JSON.stringify(agents));
            renderAgents();
        }
        
        // Render agents
        function renderAgents() {
            const container = document.getElementById('agents-container');
            const emptyState = document.getElementById('empty-state');
            const countEl = document.getElementById('agent-count');
            
            countEl.textContent = `${agents.length} agent${agents.length === 1 ? '' : 's'}`;
            
            if (agents.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'flex';
                return;
            }
            
            container.style.display = 'grid';
            emptyState.style.display = 'none';
            
            container.innerHTML = agents.map(agent => `
                <div class="agent-card ${agent.status}">
                    <button class="remove-btn" onclick="removeAgent('${agent.id}')">×</button>
                    <div class="agent-header">
                        <span class="status-dot ${agent.status}"></span>
                        <span class="agent-name">${agent.name}</span>
                    </div>
                    <p class="agent-task">${agent.task}</p>
                    <div class="agent-footer">
                        <span class="agent-status ${agent.status}">${agent.status}</span>
                        <span class="agent-time">${agent.started || ''}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Spawn agent
        function spawnAgent() {
            const name = document.getElementById('task-name').value.trim();
            const task = document.getElementById('task-description').value.trim() || name;
            
            if (!name) {
                alert('Please enter a task name');
                return;
            }
            
            const agent = {
                id: Date.now().toString(),
                name: name,
                task: task,
                status: 'running',
                started: new Date().toLocaleTimeString()
            };
            
            agents.push(agent);
            saveAgents();
            closeNewTask();
            
            // Simulate work - in real impl, this would call the backend
            setTimeout(() => {
                const idx = agents.findIndex(a => a.id === agent.id);
                if (idx >= 0) {
                    agents[idx].status = 'completed';
                    saveAgents();
                }
            }, 3000 + Math.random() * 5000);
        }
        
        // Remove agent
        function removeAgent(id) {
            agents = agents.filter(a => a.id !== id);
            saveAgents();
        }
        
        // Remove completed
        function removeCompleted() {
            agents = agents.filter(a => a.status !== 'completed');
            saveAgents();
        }
        
        // Collect results
        function collectResults() {
            const completed = agents.filter(a => a.status === 'completed');
            if (completed.length === 0) {
                alert('No completed agents to collect from');
                return;
            }
            alert(`Collected results from ${completed.length} agent(s)`);
            // In real impl, would gather actual results
        }
        
        // Refresh
        function refreshAgents() {
            loadAgents();
        }
        
        // Modals
        function openNewTask() {
            document.getElementById('new-task-modal').style.display = 'flex';
            document.getElementById('task-name').focus();
        }
        
        function closeNewTask() {
            document.getElementById('new-task-modal').style.display = 'none';
            document.getElementById('task-name').value = '';
            document.getElementById('task-description').value = '';
        }
        
        function openSettings() {
            document.getElementById('settings-modal').style.display = 'flex';
            document.getElementById('workspace-path').value = settings.workspace;
        }
        
        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }
        
        function saveSettings() {
            settings.workspace = document.getElementById('workspace-path').value;
            localStorage.setItem('ares-workspace', settings.workspace);
            closeSettings();
        }
        
        // Init
        loadAgents();
        
        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeNewTask();
                closeSettings();
            }
            if (e.key === 'n' && (e.metaKey || e.ctrlKey)) {
                e.preventDefault();
                openNewTask();
            }
        });
    </script>
</body>
</html>
